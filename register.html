<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - DentaCare Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <main class="auth-page">
    <img class="auth-line auth-line-left" src="images/Single BlueLine.png" alt="" aria-hidden="true" />
    <img class="auth-line auth-line-right" src="images/Single BlueLine.png" alt="" aria-hidden="true" />
    <section class="auth-card auth-card-register" aria-labelledby="registerTitle">
      <a class="auth-brand" href="home.html" aria-label="DentaCare home">
        <img src="images/DentaCare logo1.png" alt="DentaCare logo" />
      </a>
      <h1 id="registerTitle">DentaCare</h1>
      <p class="auth-subtitle">Welcome back to your dental portal<br>Register here</p>

      <form class="auth-form" id="registerForm" novalidate>
        <div class="auth-two-col">
          <div class="auth-field">
            <label for="firstName">First Name:</label>
            <div class="auth-input-wrap auth-icon-user">
              <input id="firstName" name="firstName" type="text" placeholder="John" required aria-describedby="firstNameError" />
            </div>
            <p class="auth-error" id="firstNameError"></p>
          </div>
          <div class="auth-field">
            <label for="lastName">Last Name:</label>
            <div class="auth-input-wrap auth-icon-user">
              <input id="lastName" name="lastName" type="text" placeholder="Doe" required aria-describedby="lastNameError" />
            </div>
            <p class="auth-error" id="lastNameError"></p>
          </div>
        </div>
        <div class="auth-field">
          <label for="registerEmail">Email Address:</label>
          <div class="auth-input-wrap auth-icon-email">
            <input id="registerEmail" name="email" type="email" placeholder="your@email.com" required aria-describedby="registerEmailError" />
          </div>
          <p class="auth-error" id="registerEmailError"></p>
        </div>
        <div class="auth-field">
          <label for="registerPhone">Phone number:</label>
          <div class="auth-input-wrap auth-icon-phone">
            <input id="registerPhone" name="phone" type="tel" placeholder="(+27) 456-7890" required aria-describedby="registerPhoneError" />
          </div>
          <p class="auth-error" id="registerPhoneError"></p>
        </div>
        <div class="auth-field">
          <label for="dateOfBirth">Date of Birth:</label>
          <div class="auth-input-wrap auth-icon-calendar">
            <input id="dateOfBirth" name="dateOfBirth" type="date" placeholder="mm/dd/yyyy" required aria-describedby="dateOfBirthError" />
          </div>
          <p class="auth-error" id="dateOfBirthError"></p>
        </div>
        <div class="auth-field">
          <label for="registerPassword">Password:</label>
          <div class="auth-input-wrap auth-icon-lock">
            <input id="registerPassword" name="password" type="password" placeholder="Enter your password" required aria-describedby="registerPasswordError passwordStrengthText" />
            <button class="password-toggle" type="button" aria-label="Show password">Show</button>
          </div>
          <div class="password-strength" aria-hidden="true"><span></span></div>
          <p class="auth-error" id="registerPasswordError"></p>
          <p class="strength-text" id="passwordStrengthText">Use at least 8 characters with a number.</p>
        </div>
        <div class="auth-field">
          <label for="confirmPassword">Confirm Password:</label>
          <div class="auth-input-wrap auth-icon-lock">
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Confirm your password" required aria-describedby="confirmPasswordError" />
            <button class="password-toggle" type="button" aria-label="Show password">Show</button>
          </div>
          <p class="auth-error" id="confirmPasswordError"></p>
        </div>
        <button class="btn btn-primary btn-large auth-submit" type="submit">Register</button>
        <p class="auth-message" id="registerMessage" role="status" aria-live="polite"></p>
      </form>
      <p class="auth-footer-text">Already have an account? <a href="login.html">Sign In</a></p>
    </section>
    <div class="auth-modal" id="registerSuccessModal" role="dialog" aria-modal="true" aria-labelledby="registerSuccessTitle" aria-hidden="true">
      <div class="auth-modal-box">
        <span class="auth-modal-icon" aria-hidden="true">✓</span>
        <h2 id="registerSuccessTitle">Account Created</h2>
        <p>Your DentaCare account has been created successfully. Redirecting you to login.</p>
      </div>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
