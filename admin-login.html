<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Administrator Portal - DentaCare Dental Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-login-body">
  <main class="admin-login-page" aria-labelledby="adminLoginTitle">
    <img class="admin-login-line admin-login-line-top" src="images/Single BlueLine.png" alt="" aria-hidden="true" />
    <img class="admin-login-line admin-login-line-bottom" src="images/Single BlueLine.png" alt="" aria-hidden="true" />

    <section class="admin-login-shell" aria-live="polite">
      <div class="admin-login-card" id="adminLoginCard">
        <div class="admin-security-chip" aria-label="Staff-only secure portal">
          <span aria-hidden="true"></span>
          Staff-only portal
        </div>

        <a class="admin-login-brand" href="home.html" aria-label="DentaCare home">
          <img src="images/DentaCare logo1.png" alt="DentaCare logo" />
        </a>

        <h1 id="adminLoginTitle">Administrator Portal</h1>
        <p class="admin-login-subtitle">Secure access for authorized DentaCare staff only.</p>

        <p class="admin-security-notice">
          Only authorized Administrators and Clinic Staff may access this system.
        </p>

        <form class="admin-login-form" id="adminLoginForm" novalidate>
          <div class="admin-field">
            <div class="admin-input-wrap admin-input-email">
              <span class="admin-input-icon" aria-hidden="true">
                <!-- envelope icon -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M3 6.5C3 5.67 3.67 5 4.5 5h15c.83 0 1.5.67 1.5 1.5v11c0 .83-.67 1.5-1.5 1.5h-15A1.5 1.5 0 0 1 3 17.5v-11z" stroke="#5B4FB0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M21 6.5l-9 6-9-6" stroke="#5B4FB0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input id="adminEmail" name="email" type="email" autocomplete="email" placeholder=" " required aria-describedby="adminEmailError" />
              <label for="adminEmail">Email Address</label>
            </div>
            <p class="admin-error" id="adminEmailError" aria-live="polite"></p>
          </div>

          <div class="admin-field">
            <div class="admin-input-wrap admin-input-lock">
              <span class="admin-input-icon" aria-hidden="true">
                <!-- lock icon -->
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="3" y="11" width="18" height="10" rx="2" stroke="#5B4FB0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="#5B4FB0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <input id="adminPassword" name="password" type="password" autocomplete="current-password" placeholder=" " required aria-describedby="adminPasswordError" />
              <label for="adminPassword">Password</label>
              <button class="admin-password-toggle" id="adminPasswordToggle" type="button" aria-label="Show password" aria-pressed="false">
                <span class="admin-toggle-show">Show</span>
                <span class="admin-toggle-hide">Hide</span>
              </button>
            </div>
            <p class="admin-error" id="adminPasswordError" aria-live="polite"></p>
          </div>

          <div class="admin-login-options">
            <label class="admin-remember-option">
              <input id="adminRemember" name="remember" type="checkbox" checked />
              <span>Remember Me</span>
            </label>
            <button class="admin-forgot-link" id="adminForgotPassword" type="button">Forgot Password?</button>
          </div>

          <button class="admin-signin-btn" id="adminSignInBtn" type="submit" disabled>
            <span class="admin-button-label">Sign In</span>
            <span class="admin-button-spinner" aria-hidden="true"></span>
          </button>

          <p class="admin-message" id="adminLoginMessage" role="status" aria-live="polite"></p>
        </form>
      </div>

      <footer class="admin-login-footer">
        <p>&copy; 2026 DentaCare Dental Management System</p>
        <p>Authorized Personnel Only.</p>
      </footer>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="admin-auth.js"></script>
</body>
</html>
