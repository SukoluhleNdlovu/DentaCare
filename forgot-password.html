<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot Password - DentaCare Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <main class="auth-page">
    <img class="auth-line auth-line-left" src="images/Single BlueLine.png" alt="" aria-hidden="true" />
    <img class="auth-line auth-line-right" src="images/Single BlueLine.png" alt="" aria-hidden="true" />
    <section class="auth-card auth-card-forgot" aria-labelledby="forgotTitle">
      <a class="auth-brand" href="home.html" aria-label="DentaCare home">
        <img src="images/DentaCare logo1.png" alt="DentaCare logo" />
      </a>
      <h1 id="forgotTitle">DentaCare</h1>
      <p class="auth-subtitle">Welcome back to your dental portal</p>

      <form class="auth-form" id="forgotForm" novalidate>
        <div class="auth-field">
          <label for="forgotEmail">Email:</label>
          <div class="auth-input-wrap auth-icon-email">
            <input id="forgotEmail" name="email" type="email" placeholder="your@email.com" required aria-describedby="forgotEmailError" />
          </div>
          <p class="auth-error" id="forgotEmailError"></p>
        </div>
        <button class="btn btn-primary btn-large auth-submit" type="submit">Send Email</button>
        <p class="auth-message auth-message-success" id="forgotMessage" role="status" aria-live="polite"></p>
      </form>
      <p class="auth-footer-text"><a href="login.html">Back to Sign In</a></p>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
  <script src="chatbot.js"></script>
</body>
</html>
